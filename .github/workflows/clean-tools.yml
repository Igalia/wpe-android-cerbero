name: Clean Build Tools
on:
  workflow_dispatch:
    inputs:
      clean_arm64:
        description: 'Clean ARM64'
        required: true
        type: boolean
        default: true
      clean_x86_64:
        description: 'Clean x86_64'
        required: true
        type: boolean
        default: true

jobs:
  clean:
    runs-on: self-hosted
    strategy:
      matrix:
        target: [arm64, x86_64]
    steps:
      - name: Fetch source code
        uses: actions/checkout@v4
      - name: Setup Cerbero
        uses: ./.github/actions/setup-cerbero
        with:
          target_arch: ${{ matrix.target }}
      - name: Clean Build Tools
        if: ${{ inputs.clean_arm64 }}
        run: |
          ./cerbero-uninstalled -t -c local.cbc -c "${ANDROID_CONFIG}" \
            wipe --keep-sources --build-tools --force
